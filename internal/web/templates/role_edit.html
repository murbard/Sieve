{{define "role_edit"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Role: {{.Role.Name}} - Sieve</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  {{template "nav" .}}

  <main class="ml-64 p-8">
    <div class="max-w-4xl">
      <h1 class="text-2xl font-bold text-white mb-6">Edit Role: {{.Role.Name}}</h1>

      <div class="bg-slate-800 rounded-xl border border-slate-700 p-6">
        <form method="POST" action="/roles/{{.Role.ID}}/update" onsubmit="return prepareRoleSubmit()">
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-400 mb-1.5">Role Name</label>
            <input type="text" name="name" required value="{{.Role.Name}}"
                   class="w-full max-w-md rounded-lg bg-slate-900 border border-slate-600 px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>

          <input type="hidden" name="bindings" id="bindings-json" value="[]">

          <div class="mb-4">
            <p class="text-sm font-medium text-slate-400 mb-2">Connection Bindings</p>
            <p class="text-xs text-slate-500 mb-3">For each connection, select which policies apply. A connection with no policies means the agent cannot use it.</p>

            <div id="bindings-list" class="space-y-3">
            </div>

            <button type="button" onclick="addBinding()" class="mt-3 text-sm text-indigo-400 hover:text-indigo-300">+ Add connection</button>
          </div>

          <div class="flex gap-3">
            <button type="submit" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500 transition-colors">
              Save Changes
            </button>
            <a href="/roles" class="rounded-lg bg-slate-700 px-4 py-2 text-sm font-medium text-slate-300 hover:bg-slate-600 transition-colors">
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    var connections = [
      {{range .Connections}}
      {id: "{{.ID}}", name: "{{.DisplayName}}", type: "{{.ConnectorType}}"},
      {{end}}
    ];
    var policies = [
      {{range .Policies}}
      {id: "{{.ID}}", name: "{{.Name}}"},
      {{end}}
    ];

    // Initialize bindings from existing role data.
    var bindings = [
      {{range .Role.Bindings}}
      {connection_id: "{{.ConnectionID}}", policy_ids: [{{range $i, $p := .PolicyIDs}}{{if $i}},{{end}}"{{$p}}"{{end}}]},
      {{end}}
    ];

    renderBindings();

    function addBinding() {
      bindings.push({connection_id: "", policy_ids: []});
      renderBindings();
    }

    function removeBinding(index) {
      bindings.splice(index, 1);
      renderBindings();
    }

    function renderBindings() {
      var list = document.getElementById("bindings-list");
      list.innerHTML = bindings.map(function(b, i) {
        var connOptions = '<option value="">Select connection...</option>' +
          connections.map(function(c) {
            var sel = c.id === b.connection_id ? " selected" : "";
            return '<option value="' + c.id + '"' + sel + '>' + c.name + ' (' + c.id + ')</option>';
          }).join("");

        var policyChecks = policies.map(function(p) {
          var checked = b.policy_ids.indexOf(p.id) !== -1 ? " checked" : "";
          return '<label class="flex items-center gap-1.5 cursor-pointer">' +
            '<input type="checkbox" class="binding-policy rounded border-slate-500 bg-slate-700 text-indigo-500" ' +
            'data-binding="' + i + '" data-policy="' + p.id + '"' + checked + '>' +
            '<span class="text-xs text-slate-300">' + p.name + '</span></label>';
        }).join("");

        return '<div class="bg-slate-900 border border-slate-700 rounded-lg p-4">' +
          '<div class="flex items-start gap-4">' +
            '<div class="flex-1">' +
              '<label class="block text-xs text-slate-400 mb-1">Connection</label>' +
              '<select class="binding-conn w-full rounded-lg bg-slate-800 border border-slate-600 px-3 py-1.5 text-sm text-white" data-index="' + i + '">' +
                connOptions +
              '</select>' +
            '</div>' +
            '<div class="flex-1">' +
              '<label class="block text-xs text-slate-400 mb-1">Policies <span class="text-slate-600">(none = deny all)</span></label>' +
              '<div class="space-y-1 max-h-32 overflow-y-auto">' + policyChecks + '</div>' +
            '</div>' +
            '<button type="button" onclick="removeBinding(' + i + ')" class="text-red-400 hover:text-red-300 text-sm mt-5">Remove</button>' +
          '</div>' +
        '</div>';
      }).join("");

      document.querySelectorAll(".binding-conn").forEach(function(sel) {
        sel.addEventListener("change", function() {
          bindings[parseInt(this.dataset.index)].connection_id = this.value;
        });
      });
      document.querySelectorAll(".binding-policy").forEach(function(cb) {
        cb.addEventListener("change", function() {
          var idx = parseInt(this.dataset.binding);
          var pid = this.dataset.policy;
          if (this.checked) {
            if (bindings[idx].policy_ids.indexOf(pid) === -1) bindings[idx].policy_ids.push(pid);
          } else {
            bindings[idx].policy_ids = bindings[idx].policy_ids.filter(function(p) { return p !== pid; });
          }
        });
      });
    }

    function prepareRoleSubmit() {
      var valid = bindings.filter(function(b) { return b.connection_id !== ""; });
      document.getElementById("bindings-json").value = JSON.stringify(valid);
      return true;
    }
  </script>
</body>
</html>
{{end}}
